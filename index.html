  <header class="site-header">
    <div class="container">
      <div class="header-stack">
        <div class="header-top">
          <a class="logo" href="/kz-microloans/">KZ Microloans</a>
          <div class="lang-switch">
            <a class="lang-link active" href="/kz-microloans/">RU</a>

          </div>
        </div>
        <nav class="top-nav">
          <div class="nav-track">
            <a class="nav-mint" href="/kz-microloans/na-kartu/">На карту</a>
            <a class="nav-sky" href="/kz-microloans/do-zarplaty/">До зарплаты</a>
            <a class="nav-lilac" href="/kz-microloans/pervyi-zaym/">Первый займ</a>
            <a class="nav-lemon" href="/kz-microloans/bez-podpisok/">Без подписок</a>

          </div>
        </nav>
      </div>
    </div>
  </header>

<script>
const nav = document.querySelector('.top-nav');
const track = document.querySelector('.nav-track');
let isDown = false;
let startX;
let scrollLeft;

nav.addEventListener('mousedown', (e) => {
  isDown = true;
  nav.classList.add('is-dragging');
  startX = e.pageX;
  scrollLeft = track.getBoundingClientRect().left;
});

nav.addEventListener('mouseleave', () => {
  isDown = false;
  nav.classList.remove('is-dragging');
});

nav.addEventListener('mouseup', () => {
  isDown = false;
  nav.classList.remove('is-dragging');
});

nav.addEventListener('mousemove', (e) => {
  if(!isDown) return;
  e.preventDefault();
  const walk = (e.pageX - startX);
  track.style.transform = `translateX(${walk}px)`;
});

nav.addEventListener('touchstart', (e) => {
  isDown = true;
  nav.classList.add('is-dragging');
  startX = e.touches[0].pageX;
});

nav.addEventListener('touchend', () => {
  isDown = false;
  nav.classList.remove('is-dragging');
});

nav.addEventListener('touchmove', (e) => {
  if(!isDown) return;
  const walk = (e.touches[0].pageX - startX);
  track.style.transform = `translateX(${walk}px)`;
});
</script>

</body>
